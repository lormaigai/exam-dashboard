name: Deploy Exam Control to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dashboard
        run: node scripts/validate-dashboard.mjs

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp index.html _site/404.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed dashboard
        shell: bash
        run: |
          site_url="${{ steps.deployment.outputs.page_url }}"
          for attempt in {1..20}; do
            body="$(curl --fail --silent --show-error --location "${site_url}?deploy=${GITHUB_SHA}" || true)"
            if [[ "$body" == *"EXAM CONTROL"* && "$body" == *"CONTENT_VERSION"* ]]; then
              echo "Dashboard is live at $site_url"
              exit 0
            fi
            sleep 6
          done
          echo "Dashboard did not become healthy at $site_url" >&2
          exit 1
